apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    app: todo-chatbot-frontend
spec:
  type: {{ .Values.service.frontend.type }}
  selector:
    app: todo-chatbot-frontend
  ports:
    - protocol: TCP
      port: {{ .Values.service.frontend.port }}
      targetPort: {{ .Values.service.frontend.targetPort }}
